#
# 启动: docker compose up -d
# 查看日志: docker compose logs -f
# 停止: docker compose down
# 升级: docker compose pull && docker compose up -d

services:
  orbitai:
    build: .
    image: orbitai:1.0.0
    container_name: orbitai
    restart: unless-stopped

    # 默认只绑 127.0.0.1，前面套 Nginx/Caddy 做 HTTPS 终止
    # 公网直接暴露请改为 "8765:8765" 并务必加上反代 + HTTPS
    ports:
      - "127.0.0.1:8765:8765"

    # 凭证 + LLM keys 通过环境变量注入；.env 不入镜像也不入 git
    env_file:
      - .env

    environment:
      # 默认 Asia/Shanghai；按部署地区改（影响 stats.py 按日聚合）
      - TZ=Asia/Shanghai

    # 持久化目录：grid.db / stats.db / logs / runtime_config.json /
    # llm_keys.json / prompts/scalp.txt 都在 ./data 下
    volumes:
      - ./data:/data

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/api/about',timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # 容器资源限额（按需调整）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
